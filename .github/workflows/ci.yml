name: CI — SLM Document Intelligence Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 app.py rag.py db/ tests/ --max-line-length=100 --ignore=E501,W503,E221,E241,E261,F401 --exclude=__pycache__

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        env:
          DB_PATH: ":memory:"
        run: pytest tests/ -v --tb=short --junit-xml=test-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
